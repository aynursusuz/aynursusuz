<svg width="900" height="260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#9b59b6" stroke-width="0.5" opacity="0.12"/>
    </pattern>

    <linearGradient id="purplePink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e91e8c;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="900" height="260" fill="#0d0117"/>

  <!-- Grid -->
  <rect width="900" height="260" fill="url(#grid)"/>

  <!-- Scanning line -->
  <rect width="900" height="2" fill="#9b59b6" opacity="0.25">
    <animate attributeName="y" from="-2" to="260" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Glitch: pink channel offset -->
  <text x="452" y="110" font-family="'Segoe UI', 'Arial', sans-serif" font-size="62" font-weight="800" fill="#e91e8c" opacity="0.5" text-anchor="middle">
    Aynur Susuz
    <animate attributeName="x" values="452;455;452;454;452" dur="0.3s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch: purple channel offset -->
  <text x="448" y="110" font-family="'Segoe UI', 'Arial', sans-serif" font-size="62" font-weight="800" fill="#9b59b6" opacity="0.5" text-anchor="middle">
    Aynur Susuz
    <animate attributeName="x" values="448;445;448;446;448" dur="0.3s" repeatCount="indefinite"/>
  </text>

  <!-- Main name -->
  <text x="450" y="110" font-family="'Segoe UI', 'Arial', sans-serif" font-size="62" font-weight="800" fill="#ffffff" filter="url(#neonGlow)" text-anchor="middle">
    Aynur Susuz
  </text>

  <!-- Glitch bars -->
  <rect x="250" y="88" width="140" height="2.5" fill="#9b59b6" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0;0;0;0;0;0.5;0" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="530" y="105" width="110" height="2" fill="#e91e8c" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.6;0;0;0;0;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="450" y="155" font-family="'Courier New', monospace" font-size="16" font-weight="400" fill="#c4a1d4" text-anchor="middle" letter-spacing="2" opacity="0.9">
    &lt; AI ENGINEER · LLM FINE-TUNING · TTS /&gt;
  </text>

  <!-- Animated accent line -->
  <line x1="280" y1="178" x2="620" y2="178" stroke="url(#purplePink)" stroke-width="2" filter="url(#neonGlow)">
    <animate attributeName="stroke-dasharray" values="0,340;340,0" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- Status box -->
  <g transform="translate(365, 198)">
    <rect width="170" height="32" fill="#0d0117" stroke="#9b59b6" stroke-width="1.5" rx="4"/>
    <circle cx="20" cy="16" r="5" fill="#e91e8c">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="88" y="21" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#c4a1d4" text-anchor="middle">
      AVAILABLE
    </text>
  </g>

  <!-- Corner brackets -->
  <polyline points="20,40 20,15 45,15" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.4"/>
  <polyline points="855,15 880,15 880,40" fill="none" stroke="#e91e8c" stroke-width="1.5" opacity="0.4"/>
  <polyline points="20,220 20,245 45,245" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.4"/>
  <polyline points="855,245 880,245 880,220" fill="none" stroke="#e91e8c" stroke-width="1.5" opacity="0.4"/>
</svg>
