<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0117"/>
      <stop offset="50%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#120228"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#e91e8c"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#9b59b6" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Decorative accent lines -->
  <line x1="80" y1="170" x2="380" y2="170" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <line x1="520" y1="170" x2="820" y2="170" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

  <!-- Corner accents -->
  <polyline points="20,40 20,20 40,20" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.3"/>
  <polyline points="860,20 880,20 880,40" fill="none" stroke="#e91e8c" stroke-width="1.5" opacity="0.3"/>
  <polyline points="20,160 20,180 40,180" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.3"/>
  <polyline points="860,180 880,180 880,160" fill="none" stroke="#e91e8c" stroke-width="1.5" opacity="0.3"/>

  <!-- Glowing orbs -->
  <circle cx="120" cy="100" r="60" fill="#9b59b6" opacity="0.04"/>
  <circle cx="780" cy="100" r="60" fill="#e91e8c" opacity="0.04"/>

  <!-- Name -->
  <text x="450" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" filter="url(#glow)">
    Aynur Susuz
  </text>

  <!-- Subtitle -->
  <text x="450" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" fill="#c4a1d4" letter-spacing="3">
    AI Engineer · LLM Fine-Tuning · TTS
  </text>

  <!-- Thin accent line under subtitle -->
  <rect x="340" y="142" width="220" height="1.5" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
