<svg width="520" height="130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect width="520" height="130" fill="#0d0117" stroke="#9b59b6" stroke-width="1.5" rx="8"/>

  <!-- Title bar -->
  <rect width="520" height="28" fill="#1a0533" rx="8"/>
  <rect y="20" width="520" height="8" fill="#1a0533"/>
  <circle cx="18" cy="14" r="5" fill="#e91e8c"/>
  <circle cx="36" cy="14" r="5" fill="#9b59b6"/>
  <circle cx="54" cy="14" r="5" fill="#c4a1d4" opacity="0.5"/>
  <text x="260" y="18" font-family="'Courier New', monospace" font-size="11" fill="#c4a1d4" text-anchor="middle" opacity="0.7">reach_out.sh</text>

  <!-- Terminal content -->
  <text x="20" y="55" font-family="'Courier New', monospace" font-size="13" fill="#9b59b6" filter="url(#termGlow)">
    <tspan>$</tspan>
    <tspan fill="#c4a1d4"> cat contact.txt</tspan>
  </text>

  <text x="20" y="78" font-family="'Courier New', monospace" font-size="12" fill="#c4a1d4">
    <tspan fill="#e91e8c">email</tspan><tspan>    :: aynur.susuz.5561@gmail.com</tspan>
  </text>

  <text x="20" y="98" font-family="'Courier New', monospace" font-size="12" fill="#c4a1d4">
    <tspan fill="#e91e8c">linkedin</tspan><tspan> :: linkedin.com/in/aynur-susuz</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="108" width="8" height="14" fill="#9b59b6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
